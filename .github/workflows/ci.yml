name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 2'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Run CI checks
        run: npm run ci

  security-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Run security-focused API regression tests
        run: npm run test:security:api

  audit-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit runtime dependencies
        run: npm run audit:runtime

  semgrep-ce:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep CE scan
        run: >-
          docker run --rm
          -v "${{ github.workspace }}:/src"
          -w /src
          semgrep/semgrep
          semgrep scan
          --config auto
          --error
          --exclude node_modules
          --exclude .next
          --exclude dist
          --exclude .test-dist
          --exclude apps/api/prisma/migrations
          --exclude scripts

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks CLI
        run: >-
          docker run --rm
          -v "${{ github.workspace }}:/repo"
          -w /repo
          ghcr.io/gitleaks/gitleaks:v8.30.0
          detect
          --source .
          --redact
          --exit-code 1
