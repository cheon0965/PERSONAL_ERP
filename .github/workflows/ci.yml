name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 2'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Run checks (format, lint, typecheck)
        run: npm run check:quick

      - name: Run tests
        run: npm run test

  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke E2E
        run: npm run test:e2e:smoke:build

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            apps/web/test-results
            apps/web/playwright-report

  security-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Run security-focused API regression tests
        run: npm run test:security:api

  prisma-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PRISMA_INTEGRATION_DATABASE_URL: ${{ secrets.PRISMA_INTEGRATION_DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Report Prisma integration secret mode
        run: |
          if [ -n "${PRISMA_INTEGRATION_DATABASE_URL}" ]; then
            echo "Using PRISMA_INTEGRATION_DATABASE_URL for Prisma integration tests."
          else
            echo "PRISMA_INTEGRATION_DATABASE_URL is not configured for this workflow run. The Prisma integration suite will report the skip reason and exit successfully."
          fi

      - name: Run Prisma integration tests
        run: npm run test:prisma

  audit-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit runtime dependencies
        run: npm run audit:runtime

  semgrep-ce:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Keep generated outputs and migration history out of the scan, but keep
      # application auth/fetch boundaries inside the Semgrep scope.
      - name: Run Semgrep CE scan
        run: >-
          docker run --rm
          -v "${{ github.workspace }}:/src"
          -w /src
          semgrep/semgrep
          semgrep scan
          --config auto
          --error
          --exclude node_modules
          --exclude .next
          --exclude dist
          --exclude .test-dist
          --exclude apps/api/prisma/migrations
          --exclude scripts

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks CLI
        run: >-
          docker run --rm
          -v "${{ github.workspace }}:/repo"
          -w /repo
          ghcr.io/gitleaks/gitleaks:v8.30.0
          detect
          --source .
          --redact
          --exit-code 1

  CI:
    if: always()
    needs:
      [
        validate,
        e2e-smoke,
        security-regression,
        prisma-integration,
        audit-runtime,
        semgrep-ce,
        gitleaks
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Check build status
        if: >-
          contains(needs.*.result, 'failure') || 
          contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: Success
        run: echo "All statuses passed."
