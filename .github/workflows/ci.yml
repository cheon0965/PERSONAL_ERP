name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 2'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Run checks (format, lint, typecheck)
        run: npm run check:quick

      - name: Run tests
        run: npm run test

  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke E2E
        run: npm run test:e2e:smoke:build:browser

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-smoke-artifacts
          path: |
            apps/web/test-results
            apps/web/playwright-report

  security-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Run security-focused API regression tests
        run: npm run test:security:api

  prisma-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma integration tests
        run: npm run test:prisma

  audit-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit runtime dependencies
        run: npm run audit:runtime

  semgrep-ce:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 생성물과 마이그레이션 이력은 스캔에서 제외하되,
      # 애플리케이션 인증/요청 경계는 Semgrep 범위에 포함한다.
      - name: Run Semgrep CE scan
        run: >-
          docker run --rm
          -v "${{ github.workspace }}:/src"
          -w /src
          semgrep/semgrep
          semgrep scan
          --config auto
          --error
          --exclude node_modules
          --exclude .next
          --exclude dist
          --exclude .test-dist
          --exclude apps/api/prisma/migrations
          --exclude scripts

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks CLI
        env:
          GITLEAKS_LOG_OPTS: >-
            ${{ github.event_name == 'pull_request' && format('{0}..{1}',
            github.event.pull_request.base.sha,
            github.event.pull_request.head.sha) || '' }}
        run: |
          set -euo pipefail

          gitleaks_args=(
            detect
            --source .
            --redact
            --exit-code 1
          )

          if [ -n "${GITLEAKS_LOG_OPTS}" ]; then
            gitleaks_args+=(--log-opts "${GITLEAKS_LOG_OPTS}")
          else
            gitleaks_args+=(--no-git)
          fi

          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.0 \
            "${gitleaks_args[@]}"

  CI:
    if: always()
    needs:
      [
        validate,
        e2e-smoke,
        security-regression,
        prisma-integration,
        audit-runtime,
        semgrep-ce,
        gitleaks
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Check build status
        if: >-
          contains(needs.*.result, 'failure') || 
          contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: Success
        run: echo "All statuses passed."
