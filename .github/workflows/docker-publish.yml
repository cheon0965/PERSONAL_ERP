name: Docker Publish

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional additional image tag to publish.
        required: false
        type: string
      publish_latest:
        description: Also publish the latest tag.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://personalerp.theworkpc.com/api' }}
  NEXT_PUBLIC_ENABLE_DEMO_FALLBACK: ${{ vars.NEXT_PUBLIC_ENABLE_DEMO_FALLBACK || 'false' }}

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        (
          github.event.workflow_run.head_branch == 'main' ||
          github.event.workflow_run.head_branch == 'master'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: migrate
            image: cheon0965/personal-erp-migrate
          - target: api
            image: cheon0965/personal-erp-api
          - target: web
            image: cheon0965/personal-erp-web

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: >-
            ${{ github.event_name == 'workflow_run' &&
            github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image tags
        id: image-tags
        env:
          IMAGE_NAME: ${{ matrix.image }}
          HEAD_BRANCH: >-
            ${{ github.event_name == 'workflow_run' &&
            github.event.workflow_run.head_branch || github.ref_name }}
          HEAD_SHA: >-
            ${{ github.event_name == 'workflow_run' &&
            github.event.workflow_run.head_sha || github.sha }}
          MANUAL_IMAGE_TAG: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag ||
            '' }}
          MANUAL_PUBLISH_LATEST: >-
            ${{ github.event_name == 'workflow_dispatch' &&
            inputs.publish_latest || 'false' }}
        run: |
          set -euo pipefail

          short_sha="${HEAD_SHA:0:12}"
          tags="${IMAGE_NAME}:sha-${short_sha}"

          if [ -n "${MANUAL_IMAGE_TAG}" ]; then
            tags="${tags}"$'\n'"${IMAGE_NAME}:${MANUAL_IMAGE_TAG}"
          fi

          if [ "${HEAD_BRANCH}" = "main" ] ||
            [ "${HEAD_BRANCH}" = "master" ] ||
            [ "${MANUAL_PUBLISH_LATEST}" = "true" ]; then
            tags="${tags}"$'\n'"${IMAGE_NAME}:latest"
          fi

          {
            echo 'tags<<EOF'
            echo "${tags}"
            echo 'EOF'
            echo "short_sha=${short_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.target }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ env.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_ENABLE_DEMO_FALLBACK=${{ env.NEXT_PUBLIC_ENABLE_DEMO_FALLBACK }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          provenance: false

      - name: Summary
        run: |
          {
            echo '### Published image'
            echo ''
            echo '- Target: `${{ matrix.target }}`'
            echo '- Source SHA: `${{ steps.image-tags.outputs.short_sha }}`'
            echo '- Tags:'
            while IFS= read -r tag; do
              echo "  - \`${tag}\`"
            done <<< '${{ steps.image-tags.outputs.tags }}'
          } >> "${GITHUB_STEP_SUMMARY}"
