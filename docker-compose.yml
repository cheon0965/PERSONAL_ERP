version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: personal-erp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: personal_erp
      MYSQL_USER: erp_user
      MYSQL_PASSWORD: erp_password_local_2026
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - personal_erp_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u erp_user -perp_password_local_2026 --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  personal_erp_mysql_data:
