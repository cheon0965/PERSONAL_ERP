version: '3.9'

# 로컬 개발 전용 MySQL 초기화 컨테이너입니다.
# 아래 인증 정보는 단일 개발자 PC에서 `npm run db:up`이 바로 동작하도록 둔
# 폐기 가능한 기본값입니다. 공유, 스테이징, 운영 환경에서는 절대 재사용하지 마세요.

services:
  mysql:
    image: mysql:8.4
    container_name: personal-erp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: local_root_not_for_prod
      MYSQL_DATABASE: personal_erp
      MYSQL_USER: erp_user
      MYSQL_PASSWORD: local_erp_not_for_prod
      TZ: Asia/Seoul
    ports:
      - '3306:3306'
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - personal_erp_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mysqladmin ping -h localhost -u erp_user -plocal_erp_not_for_prod --silent'
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run/mysqld

volumes:
  personal_erp_mysql_data:
